services:
  app:
    image: ghcr.io/baris-unver/kidi-landing:latest
    build: .
    env_file: .env
    restart: always
    expose:
      - "3000"
    volumes:
      - content_data:/app/data/content

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
    restart: always

volumes:
  content_data:
